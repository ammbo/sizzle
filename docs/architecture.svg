<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Sizzle architecture</title>
  <desc id="desc">Cloudflare serves the frontend and proxies to an Alibaba Cloud backend. Function Compute orchestrates Qwen Cloud models and stores artifacts in OSS.</desc>
  <defs>
    <style>
      .bg{fill:#0c0d0d}.box{fill:#171818;stroke:#444743;stroke-width:2}.hot{fill:#ff5836}.acid{fill:#d5fa3c}
      .t{fill:#f5f0e7;font:600 20px Arial,sans-serif}.s{fill:#aaa69e;font:14px Arial,sans-serif}.m{fill:#f5f0e7;font:15px monospace}
      .a{stroke:#ff5836;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" class="hot"/></marker>
  </defs>
  <rect width="1200" height="720" rx="20" class="bg"/>
  <text x="60" y="60" class="t" font-size="28">SIZZLE À TRACK 2 AI SHOWRUNNER</text>

  <rect x="60" y="105" width="260" height="105" rx="12" class="box"/>
  <text x="85" y="145" class="t">SizzleVideoAI.com</text>
  <text x="85" y="177" class="s">Cloudflare Worker + static UI</text>

  <rect x="470" y="105" width="265" height="105" rx="12" class="box"/>
  <text x="495" y="145" class="t">Function Compute API</text>
  <text x="495" y="177" class="s">Auth À job state À async invoke</text>

  <rect x="875" y="105" width="265" height="105" rx="12" class="box"/>
  <text x="900" y="145" class="t">Alibaba Cloud OSS</text>
  <text x="900" y="177" class="s">Shots À audio À cuts À manifests</text>

  <path d="M320 157 H465" class="a"/>
  <path d="M735 157 H870" class="a"/>

  <rect x="60" y="310" width="1080" height="330" rx="18" class="box"/>
  <text x="90" y="355" class="t">Alibaba Cloud pipeline worker</text>

  <rect x="95" y="395" width="190" height="90" rx="10" class="box"/>
  <text x="120" y="430" class="t">Story engine</text>
  <text x="120" y="459" class="s">Qwen3.7-Max</text>

  <rect x="345" y="395" width="190" height="90" rx="10" class="box"/>
  <text x="370" y="430" class="t">Budget solver</text>
  <text x="370" y="459" class="s">Token-aware routing</text>

  <rect x="595" y="385" width="205" height="62" rx="10" class="box"/>
  <text x="620" y="423" class="m">GENERATE À Wan</text>
  <rect x="595" y="465" width="205" height="62" rx="10" class="box"/>
  <text x="620" y="503" class="m">CAPTURE À Qwen</text>
  <rect x="595" y="545" width="205" height="62" rx="10" class="box"/>
  <text x="620" y="583" class="m">RENDER À ffmpeg</text>

  <rect x="860" y="395" width="230" height="90" rx="10" class="box"/>
  <text x="885" y="430" class="t">Assembler + VO</text>
  <text x="885" y="459" class="s">CosyVoice À captions À mix</text>

  <rect x="860" y="535" width="230" height="72" rx="10" class="box"/>
  <text x="885" y="569" class="t">Multimodal critic</text>
  <text x="885" y="592" class="s">Qwen3.7-Plus À typed recuts</text>

  <path d="M285 440 H340" class="a"/><path d="M535 440 H590" class="a"/>
  <path d="M800 440 H855" class="a"/><path d="M800 496 H855" class="a"/><path d="M800 576 H855" class="a"/>
  <path d="M975 485 V530" class="a"/>
  <path d="M860 571 C760 665 205 670 190 490" class="a"/>

  <circle cx="1120" cy="60" r="8" class="acid"/>
  <text x="1088" y="66" class="s" text-anchor="end">Qwen Cloud critical path</text>
</svg>
